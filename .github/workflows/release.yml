name: Release (attested + SBOM)

on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing annotated stable release tag (e.g., v0.14.0)'
        required: true
        type: string

permissions:
  contents: write       # create GitHub Releases
  attestations: write   # publish build attestations
  id-token: write       # OIDC for provenance
  actions: read

jobs:
  macos-release:
    name: macOS Release (SwiftPM)
    runs-on: macos-15
    steps:
      - name: Determine release tag
        id: release_tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          PUSHED_TAG: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            release_tag="$INPUT_TAG"
          else
            release_tag="$PUSHED_TAG"
          fi

          if [[ ! "$release_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release ref must be a stable semantic-version tag: $release_tag" >&2
            exit 1
          fi

          printf 'tag=%s\n' "$release_tag" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ steps.release_tag.outputs.tag }}
          fetch-depth: 0

      - name: Verify release tag
        env:
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        run: |
          if ! git show-ref --verify --quiet "refs/tags/$RELEASE_TAG"; then
            echo "Release tag does not exist: $RELEASE_TAG" >&2
            exit 1
          fi
          if [ "$(git cat-file -t "$RELEASE_TAG")" != "tag" ]; then
            echo "Release tag must be annotated: $RELEASE_TAG" >&2
            exit 1
          fi

          tag_commit="$(git rev-list -n 1 "$RELEASE_TAG")"
          checkout_commit="$(git rev-parse HEAD)"
          if [ "$tag_commit" != "$checkout_commit" ]; then
            echo "Checked-out commit does not match $RELEASE_TAG" >&2
            exit 1
          fi
          if ! git merge-base --is-ancestor "$tag_commit" origin/main; then
            echo "Release tag must point to a commit on main: $RELEASE_TAG" >&2
            exit 1
          fi

      - name: Swift version
        run: swift --version

      - name: Build (release)
        env:
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        run: |
          swift build -c release
          expected_version="${RELEASE_TAG#v}"
          actual_version="$(.build/release/swift-ftr --version)"
          if [ "$actual_version" != "$expected_version" ]; then
            echo "CLI version $actual_version does not match tag $RELEASE_TAG" >&2
            exit 1
          fi
          cp .build/release/swift-ftr swift-ftr-macos-arm64
          shasum -a 256 swift-ftr-macos-arm64 > swift-ftr-macos-arm64.sha256

      - name: Generate SBOM (CycloneDX JSON)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: swift-ftr-${{ steps.release_tag.outputs.tag }}-macos-arm64
          path: |
            swift-ftr-macos-arm64
            swift-ftr-macos-arm64.sha256
            sbom.cdx.json

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            swift-ftr-macos-arm64
            swift-ftr-macos-arm64.sha256
            sbom.cdx.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          files: |
            swift-ftr-macos-arm64
            swift-ftr-macos-arm64.sha256
            sbom.cdx.json
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
